name: 每日台股AI完整掃描

on:
  # 收盤後 15:30 開始第一批（UTC 07:30）
  schedule:
    - cron: '30 7 * * 1-5'   # 15:30 第一批 (batch 1-3, ~600次)
    - cron: '30 8 * * 1-5'   # 16:30 第二批 (batch 4-6, ~600次)
    - cron: '30 9 * * 1-5'   # 17:30 第三批 (batch 7-9, ~600次)

  # 管理員手動觸發（指定批次）
  workflow_dispatch:
    inputs:
      batch:
        description: '批次號碼 (1=1-200, 2=201-400, 3=401-600...)'
        required: true
        default: '1'
      force_full:
        description: '強制掃全部 (true/false)'
        required: false
        default: 'false'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 110   # 留10分鐘緩衝

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests

      - name: 執行掃描
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          # 自動排程：依照觸發時間決定批次
          # 手動觸發：用輸入的批次號
          BATCH_NUM:  ${{ github.event.inputs.batch || '0' }}
          FORCE_FULL: ${{ github.event.inputs.force_full || 'false' }}
        run: python scripts/daily_scan.py

      - name: 上傳結果記錄
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-log-${{ github.run_id }}
          path: scripts/output/
          retention-days: 30
