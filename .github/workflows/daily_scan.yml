name: 每日台股AI完整掃描+機器人操作

on:
  schedule:
    - cron: '30 7 * * 1-5'   # 15:30 第一批掃描
    - cron: '30 8 * * 1-5'   # 16:30 第二批掃描
    - cron: '30 9 * * 1-5'   # 17:30 第三批掃描+機器人+MOPS公告

  workflow_dispatch:
    inputs:
      batch:
        description: '批次 (1/2/3/robots/mops/all)'
        required: true
        default: '1'

jobs:
  scan-and-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 110

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests beautifulsoup4 lxml

      - name: 執行股票掃描
        if: ${{ github.event.inputs.batch != 'robots' && github.event.inputs.batch != 'mops' }}
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          BATCH_NUM:     ${{ github.event.inputs.batch || '0' }}
        run: python scripts/daily_scan.py

      - name: 爬取 MOPS 公開資訊觀測站公告
        # 每天 17:30 或手動選 mops/all 時執行
        if: >
          github.event.schedule == '30 9 * * 1-5' ||
          github.event.inputs.batch == 'mops' ||
          github.event.inputs.batch == 'all'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/fetch_mops.py

      - name: 執行機器人盤後操作
        if: >
          github.event.schedule == '30 9 * * 1-5' ||
          github.event.inputs.batch == 'robots' ||
          github.event.inputs.batch == 'all'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/robot_run.py

      - name: 上傳結果記錄
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-log-${{ github.run_id }}
          path: scripts/output/
          retention-days: 30
